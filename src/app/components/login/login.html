<div class="login-page">

  <div class="login-card">

    <div class="logo">

      📦

      <h1>StockHive</h1>

      <p>Inventory Management System</p>

    </div>

    <h2>Welcome Back 👋</h2>

    <p class="subtitle">
      Sign in to continue
    </p>

    <input
      type="email"
      placeholder="Email Address"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Login to Dashboard
    </button>

  </div>

</div>
